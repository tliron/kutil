[package]
edition = "2024"

name = "kutil"
description = "Kutil utilities collection"
version = "0.0.5"
rust-version = "1.93"

license = "MIT OR Apache-2.0"
repository = "https://github.com/tliron/kutil"
documentation = "https://docs.rs/kutil"
authors = ["Tal Liron"]

readme = "../README.md"

categories = ["development-tools"] # https://crates.io/category_slugs
keywords = ["kutil", "cli", "http", "io", "transcoding"]

[dependencies]
# cli
anstream = { optional = true, version = "0.6.21" }
anstyle = { optional = true, version = "1.0.13" }
build-info = { optional = true, version = "0.0.42" }
clap = { optional = true, version = "4.5.57", features = ["derive"] }
clap_complete_command = { optional = true, version = "0.6.1" }
clap_mangen = { optional = true, version = "0.2.31" }
owo-colors = { optional = true, version = "4.2.3" }
problemo = { optional = true, version = "=0.0.8" }
time = { optional = true, version = "0.3.46", features = ["macros"] }
tracing-journald = { optional = true, version = "0.3.2" }
tracing-subscriber = { optional = true, version = "0.3.22", features = [
    "env-filter",
    "local-time",
] }

# http
axum = { optional = true, version = "0.8.8" }
axum-server = { optional = true, version = "0.8.0" }
base64-simd = { optional = true, version = "0.8.0" }
derive_more = { optional = true, version = "2.1.1", features = ["display", "error", "from"] }
duration-str = { optional = true, version = "0.19.0" }
http = { optional = true, version = "1.4.0" }
http-body = { optional = true, version = "1.0.1" }
httpdate = { optional = true, version = "1.0.3" }
tokio-util = { optional = true, version = "0.7.18", features = ["io-util"] }
tower = { optional = true, version = "0.5.3" }
tower-http = { optional = true, version = "0.6.8", features = ["fs"] }
url = { optional = true, version = "2.5.8" }
urlencoding = { optional = true, version = "2.1.3" }

# io
futures = { optional = true, version = "0.3.31" }
netdev = { optional = true, version = "0.40.0" }
utf8-chars = { optional = true, version = "3.0.6" }

# std
backtrace = { optional = true, version = "0.3.76" }
bimap = { optional = true, version = "0.6.3" }
bytes = { optional = true, version = "1.11.1" }
bytestring = { optional = true, version = "1.5.0" }
ctrlc = { optional = true, version = "3.5.1" }
kutil-std-macros = { optional = true, version = "=0.0.4" }
num-traits = { optional = true, version = "0.2.19" }
papaya = { optional = true, version = "0.2.3" }
rapidhash = { optional = true, version = "4.2.1", features = ["unsafe"] }

# tls
rustls = { optional = true, version = "0.23.36" }
rustls-acme = { optional = true, version = "0.15.1", features = ["axum"] }
rustls-pemfile = { optional = true, version = "2.2.0" }
rustls-pki-types = { optional = true, version = "1.14.0" }
rustls-platform-verifier = { optional = true, version = "0.6.2" }
webpki-roots = { optional = true, version = "1.0.6" }

# cli, http, tls, transcoding
tracing = { optional = true, version = "0.1.44" }

# transcoding
async-compression = { optional = true, version = "0.4.37" }
pin-project = { optional = true, version = "1.1.10" }

# http, io, transcoding
tokio = { optional = true, version = "1.49.0" }

[build-dependencies]
# cli
build-info-build = { optional = true, version = "0.0.42" }

[dev-dependencies]
derive_more = { version = "2.1.1", features = ["display", "error", "from"] }

[features]
## CLI utilities.
cli = [
    "dep:anstream",
    "dep:owo-colors",
    "dep:problemo",
    "dep:time",
    "dep:tracing",
    "dep:tracing-journald",
    "dep:tracing-subscriber",
]
## Clap utilities.
clap = [
    "dep:clap",
    "dep:clap_complete_command",
    "dep:clap_mangen",
    "dep:anstyle",
    "dep:build-info",
    "dep:build-info-build",
]

## HTTP utilities.
http = [
    "dep:base64-simd",
    "dep:derive_more",
    "dep:duration-str",
    "dep:http",
    "dep:http-body",
    "dep:httpdate",
    "dep:tracing",
    "dep:tokio",
    "dep:tokio-util",
    "dep:url",
    "dep:urlencoding",
    "io",
    "async",
    "transcoding",
    "derive",
    "fast_collections",
    "immutable",
]
## ACME support for TLS.
acme = ["dep:rustls-acme"]
## Axum utilities.
axum = [
    "dep:axum",
    "dep:axum-server",
    # "axum-server/tls-rustls",
    "tokio/signal",
    # "tower/util",
    "dep:tokio-util",
]
## File utilities for Tower.
file = ["tower", "dep:tower-http"]

## I/O utilities.
io = [
    "dep:futures",
    "dep:netdev",
    "dep:tokio",
    "dep:utf8-chars",
    "tokio/rt",
    "tokio/io-util",
]

## Enable blocking implementations.
blocking = []
## Enable async implementations.
async = []

## Standard library utilities.
std = ["dep:backtrace", "dep:ctrlc", "dep:num-traits"]
## Enable bimap
bimap = ["dep:bimap"]
## Enable fast collections.
fast_collections = ["dep:bimap", "dep:papaya", "dep:rapidhash"]
## Enable serde support.
serde = ["bytes?/serde", "bytestring?/serde"]
## Enable immutable implementations, e.g. `Bytes` and `ByteString`.
immutable = ["dep:bytes", "dep:bytestring"]

## TLS utilities.
tls = [
    "dep:rustls",
    "dep:rustls-pemfile",
    "dep:rustls-pki-types",
    "dep:tracing",
]
tls-platform = [
    "tls",
    "dep:rustls-platform-verifier"
]
tls-self-contained = [
    "tls",
    "dep:webpki-roots",
]

## Transcoding utilities.
transcoding = [
    "dep:async-compression",
    "dep:pin-project",
    "dep:tracing",
    "dep:tokio",
    "async-compression/tokio",
    "async-compression/brotli",
    "async-compression/deflate",
    "async-compression/gzip",
    "async-compression/zstd",
    "tokio/io-util",
    "std",
    "derive",
    "immutable",
]

## Include procedural macros for `derive`.
derive = ["dep:kutil-std-macros"]

## Don't manually enable this!
## It's for situations where we have all features enabled
_blanket = []

[[example]]
name = "join_conjunction"
required-features = ["std"]

# https://stackoverflow.com/a/61417700
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
